<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>

  <style>

    :root{
      --primary:#1a6644;
      --primary-dark:#124d33;

      --text:#111827;
      --text-light:#6b7280;

      --border:#e5e7eb;
      --bg:#f5f6f8;
      --white:#ffffff;

      --radius:14px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;

      font-family:
        Inter,
        Arial,
        sans-serif;

      background:var(--bg);
    }

    .login-container{
      width:100%;
      max-width:400px;

      background:var(--white);

      border:1px solid var(--border);

      border-radius:20px;

      padding:40px 32px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.05);
    }

    .logo{
      display:flex;
      justify-content:center;

      margin-bottom:24px;
    }

    .logo img{
      width:72px;
      height:72px;
      object-fit:contain;
    }

    h2{
      text-align:center;

      color:var(--text);

      font-size:28px;
      font-weight:600;

      margin-bottom:8px;
    }

    .subtitle{
      text-align:center;

      color:var(--text-light);

      font-size:14px;

      margin-bottom:28px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    input{
      width:100%;

      padding:14px 16px;

      border:1px solid var(--border);

      border-radius:var(--radius);

      font-size:15px;

      outline:none;

      background:#fff;

      transition:border-color .2s ease;
    }

    input:focus{
      border-color:var(--primary);
    }

    button{
      margin-top:4px;

      padding:14px;

      border:none;
      border-radius:var(--radius);

      background:var(--primary);

      color:white;

      font-size:15px;
      font-weight:600;

      cursor:pointer;

      transition:background .2s ease;
    }

    button:hover{
      background:var(--primary-dark);
    }

    #status{
      margin-top:16px;

      text-align:center;

      font-size:14px;

      color:var(--text-light);
    }

    .footer{
      margin-top:24px;

      text-align:center;

      color:var(--text-light);

      font-size:13px;
    }

    @media(max-width:480px){

      .login-container{
        padding:32px 22px;
      }

    }

  </style>
</head>

<body>

  <div class="login-container">

    <!-- Replace logo.png with your logo -->
    <div class="logo">
      <img src="logo.png" alt="Logo">
    </div>

    <h2>Admin Login</h2>

    <p class="subtitle">
      Sign in to continue
    </p>

    <form id="loginForm">

      <input
        type="email"
        id="email"
        placeholder="Email address"
        required
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      />

      <button type="submit">
        Login
      </button>

    </form>

    <p id="status"></p>

    <div class="footer">
      Admin Portal
    </div>

  </div>

  <script type="module">

    import { createClient }
    from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl =
      "https://tmqxjnegtiuircaxqkof.supabase.co";

    const supabaseKey =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtcXhqbmVndGl1aXJjYXhxa29mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczMTIwNTEsImV4cCI6MjA3Mjg4ODA1MX0.Mx-7VrVhR5kxiKwpuBVHyKy1LO278Z3EbcAqWLXX8Yk";

    const supabase =
      createClient(supabaseUrl, supabaseKey);

    document
      .getElementById("loginForm")
      .addEventListener("submit", async (e) => {

        e.preventDefault();

        const email =
          document.getElementById("email").value;

        const password =
          document.getElementById("password").value;

        const status =
          document.getElementById("status");

        status.innerText = "Logging in...";

        const { error } =
          await supabase.auth.signInWithPassword({
            email,
            password
          });

        if(error){

          status.style.color = "#c0392b";
          status.innerText = error.message;

        } else {

          status.style.color = "#1a6644";
          status.innerText = "Login successful";

          setTimeout(() => {
            window.location.href = "admin.html";
          }, 800);

        }

      });

  </script>

</body>
</html>
