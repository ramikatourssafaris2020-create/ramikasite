<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Details — Ramika Safaris</title>
  <meta name="description" content="View tour details and book your safari adventure with Ramika Safaris in Tanzania's Southern Highlands.">
  <link rel="canonical" href="https://ramikasafaris.com/tour">
  <link rel="icon" href="/logo.png" type="image/png">
  <meta property="og:image" content="https://ramikasafaris.com/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --primary:    #1a6644;
  --primary-dk: #124d33;
  --primary-lt: #eef7f2;
  --accent:     #e6a817;
  --accent-lt:  #fdf6e3;
  --danger:     #c0392b;
  --text:       #111827;
  --text-2:     #374151;
  --text-3:     #6b7280;
  --border:     #e5e7eb;
  --surface:    #ffffff;
  --bg:         #f9fafb;
  --bg-alt:     #f3f4f6;
  --nav-h:      68px;
  --r:          12px;
  --r-sm:       8px;
  --r-lg:       18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }
img  { display: block; max-width: 100%; }
a    { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; }

.container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
@media (min-width: 768px) { .container { padding: 0 32px; } }

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; z-index: 900;
  background: var(--surface);
  box-shadow: 0 1px 0 var(--border);
}
.nav-brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 34px; height: 34px; background: var(--primary); color: #fff;
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600;
}
.brand-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; color: var(--text); }
.brand-name em { font-style: italic; font-weight: 500; }
.nav-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; font-weight: 500; color: var(--text-2);
  padding: 8px 16px; border: 1.5px solid var(--border);
  border-radius: var(--r-sm); transition: all 0.15s;
}
.nav-back:hover { background: var(--bg-alt); color: var(--primary); border-color: var(--primary); }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── HERO IMAGE ── */
.tour-hero {
  margin-top: var(--nav-h);
  position: relative;
  height: clamp(260px, 45vw, 520px);
  overflow: hidden;
  background: #e5e7eb;
}
.tour-hero img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.6s ease;
}
.tour-hero:hover img { transform: scale(1.02); }
.tour-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%);
}
.hero-badge {
  position: absolute; top: 20px; left: 20px;
  background: var(--accent); color: #7a4f00;
  font-size: 13px; font-weight: 700;
  padding: 6px 14px; border-radius: 99px;
}
.hero-price-pill {
  position: absolute; bottom: 24px; left: 24px;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
  padding: 10px 18px; border-radius: 99px;
  display: flex; align-items: baseline; gap: 4px;
}
.hp-from { font-size: 11px; color: var(--text-3); font-weight: 500; }
.hp-val { font-size: 20px; font-weight: 700; color: var(--primary); }
.hp-per { font-size: 12px; color: var(--text-3); }

/* ── LAYOUT ── */
.tour-layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
  padding: 40px 0 64px;
}
@media (min-width: 860px) {
  .tour-layout { grid-template-columns: 1fr 360px; align-items: start; gap: 48px; }
}

/* ── MAIN CONTENT ── */
.tour-main {}
.tour-eyebrow {
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--primary); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.tour-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(26px, 5vw, 42px);
  font-weight: 600; color: var(--text); line-height: 1.2;
  margin-bottom: 20px;
}
.tour-meta-row {
  display: flex; flex-wrap: wrap; gap: 16px;
  margin-bottom: 28px; padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.meta-chip {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-2); font-weight: 500;
}
.meta-chip svg { color: var(--primary); flex-shrink: 0; }

.section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 12px;
}
.tour-desc {
  font-size: 15px; color: var(--text-2); line-height: 1.75;
  margin-bottom: 32px;
  white-space: pre-line;
}

/* Highlights / include list */
.highlights-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px; margin-bottom: 32px;
}
.hl-card {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--primary-lt); border-radius: var(--r-sm);
  padding: 14px; font-size: 13px; color: var(--primary-dk); font-weight: 500;
}
.hl-icon { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }

/* Itinerary */
.itinerary { margin-bottom: 32px; }
.it-day {
  display: flex; gap: 16px; padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.it-day:last-child { border-bottom: none; }
.it-num {
  width: 34px; height: 34px; background: var(--primary); color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.it-body h4 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.it-body p { font-size: 13px; color: var(--text-3); line-height: 1.6; }

/* Gallery */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px; margin-bottom: 32px;
}
.gallery-grid img {
  width: 100%; height: 140px; object-fit: cover;
  border-radius: var(--r-sm); transition: transform 0.2s;
  cursor: pointer;
}
.gallery-grid img:hover { transform: scale(1.03); }

/* ── STICKY SIDEBAR CARD ── */
.book-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  position: sticky; top: calc(var(--nav-h) + 20px);
}
.bc-header {
  background: var(--primary);
  padding: 20px 24px;
}
.bc-header h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: #fff; margin-bottom: 4px; }
.bc-price-row { display: flex; align-items: baseline; gap: 5px; }
.bc-from { font-size: 12px; color: rgba(255,255,255,0.7); }
.bc-price { font-size: 28px; font-weight: 700; color: #fff; }
.bc-per { font-size: 13px; color: rgba(255,255,255,0.7); }
.bc-body { padding: 20px 24px 24px; }
.ff { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.ff label { font-size: 11px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.04em; }
.ff input, .ff select {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: var(--r-sm);
  font-size: 14px; color: var(--text); background: var(--surface);
  font-family: inherit; outline: none; appearance: none;
}
.ff input:focus, .ff select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,102,68,0.1); }
.btn-book {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 13px 24px;
  background: var(--primary); color: #fff;
  border: none; border-radius: var(--r-sm);
  font-size: 14px; font-weight: 600; letter-spacing: 0.02em;
  transition: background 0.15s;
}
.btn-book:hover { background: var(--primary-dk); }
.btn-book:disabled { opacity: 0.65; cursor: not-allowed; }
.bc-note {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-3); margin-top: 12px;
}
.bc-features {
  border-top: 1px solid var(--border);
  padding: 16px 24px; display: flex; flex-direction: column; gap: 10px;
}
.bc-feat { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); }
.bc-feat svg { color: var(--primary); flex-shrink: 0; }

/* ── NOT FOUND ── */
.not-found {
  text-align: center; padding: 80px 24px;
}
.not-found h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 12px; }
.not-found p { color: var(--text-3); margin-bottom: 24px; }
.btn-back {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; background: var(--primary); color: #fff;
  border-radius: var(--r-sm); font-weight: 600; font-size: 14px;
}

/* ── TOAST ── */
#toast-root { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 18px; border-radius: var(--r-sm); font-size: 14px; font-weight: 500;
  opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15); max-width: 320px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-success { background: var(--primary); color: #fff; }
.toast-error   { background: var(--danger); color: #fff; }
.toast-info    { background: #1e40af; color: #fff; }
.toast-warning { background: var(--accent); color: #7a4f00; }

/* ── MODAL ── */
.modal-wrap {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 9000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; transition: opacity 0.25s;
}
.modal-wrap.open { opacity: 1; }
.modal-box {
  background: var(--surface); border-radius: var(--r-lg);
  padding: 32px; max-width: 440px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-top { text-align: center; margin-bottom: 24px; }
.modal-check {
  width: 56px; height: 56px; background: var(--primary); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; margin: 0 auto 14px;
}
.modal-top h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 6px; }
.modal-ref { font-size: 12px; color: var(--text-3); font-weight: 600; letter-spacing: 0.05em; }
.modal-dets { background: var(--bg); border-radius: var(--r-sm); padding: 16px; margin-bottom: 16px; }
.md-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
.md-row:not(:last-child) { border-bottom: 1px solid var(--border); }
.md-row span { font-size: 12px; color: var(--text-3); }
.md-row strong { font-size: 13px; color: var(--text); text-align: right; max-width: 60%; }
.modal-note { font-size: 12px; color: var(--text-3); text-align: center; margin-bottom: 20px; line-height: 1.6; }
.btn-submit {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 13px 24px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--r-sm); font-size: 14px; font-weight: 600;
}

/* Loading state */
.loading-state { padding: 80px 24px; text-align: center; color: var(--text-3); }
.loading-state .sk-title { width: 60%; height: 40px; margin: 0 auto 16px; }
.loading-state .sk-line { height: 14px; margin: 10px auto; }

@media (max-width: 860px) {
  .book-card { position: static; }
  .tour-layout { padding: 24px 0 48px; }
}
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">
    <span class="brand-mark">R</span>
    <span class="brand-name">Ramika <em>Safaris</em></span>
  </a>
  <a href="/" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    All Tours
  </a>
</nav>

<div id="tour-hero-wrap">
  <!-- filled by JS -->
</div>

<div class="container">
  <div id="tour-layout-wrap" class="tour-layout">
    <!-- filled by JS -->
  </div>
</div>

<div id="toast-root" aria-live="polite"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SB_URL = "https://tmqxjnegtiuircaxqkof.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtcXhqbmVndGl1aXJjYXhxa29mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczMTIwNTEsImV4cCI6MjA3Mjg4ODA1MX0.Mx-7VrVhR5kxiKwpuBVHyKy1LO278Z3EbcAqWLXX8Yk";
const supabase = createClient(SB_URL, SB_KEY);

const esc = s => (s||'').replace(/[&<>'"]/g, t=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]||t));
const $ = id => document.getElementById(id);

function toast(msg, type='info', dur=4500) {
  const r = $('toast-root'), el = document.createElement('div');
  if(!r) return;
  el.className = `toast toast-${type}`; el.textContent = msg;
  r.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 350); }, dur);
}

function fmtUSD(val) {
  const n = parseFloat(val);
  if (!val || isNaN(n) || n === 0) return 'Contact us';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

// Read tour ID from URL: /tour?id=3  or  /tour.html?id=3
const params = new URLSearchParams(window.location.search);
const tourId = params.get('id');

if (!tourId) {
  showNotFound('No tour specified.');
} else {
  loadTour(tourId);
}

async function loadTour(id) {
  showSkeleton();
  try {
    const { data, error } = await supabase
      .from('activities')
      .select('*')
      .eq('id', id)
      .single();

    if (error || !data) {
      showNotFound('Tour not found or has been removed.');
      return;
    }
    renderTour(data);
  } catch(e) {
    showNotFound('Connection error. Please refresh.');
  }
}

function showSkeleton() {
  $('tour-hero-wrap').innerHTML = `<div class="tour-hero skeleton" style="margin-top:var(--nav-h)"></div>`;
  $('tour-layout-wrap').innerHTML = `<div class="loading-state">
    <div class="skeleton sk-title"></div>
    <div class="skeleton sk-line" style="width:80%"></div>
    <div class="skeleton sk-line" style="width:65%"></div>
    <div class="skeleton sk-line" style="width:72%"></div>
  </div><div></div>`;
}

function showNotFound(msg) {
  $('tour-hero-wrap').innerHTML = '';
  $('tour-layout-wrap').innerHTML = `
    <div class="not-found" style="grid-column:1/-1">
      <h2>Tour Not Found</h2>
      <p>${esc(msg)}</p>
      <a href="/" class="btn-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back to All Tours
      </a>
    </div>`;
}

function renderTour(t) {
  // Update page title + meta
  document.title = `${t.name} — Ramika Safaris`;
  document.querySelector('meta[name="description"]')?.setAttribute('content', (t.description || '').slice(0, 155));

  let img = t.image_url;
  if(img && !img.startsWith('http')) img = `${SB_URL}/storage/v1/object/public/tour-images/${img}`;
  if(!img) img = `https://via.placeholder.com/1400x600/1a6644/fff?text=${encodeURIComponent(t.name)}`;

  const priceUSD = t.price_usd ?? t.price;
  const priceDisplay = fmtUSD(priceUSD);

  // Hero
  $('tour-hero-wrap').innerHTML = `
    <div class="tour-hero">
      <img src="${esc(img)}" alt="${esc(t.name)}" onerror="this.src='https://via.placeholder.com/1400x600/1a6644/fff?text=Safari'">
      <div class="tour-hero-overlay"></div>
      <span class="hero-badge">🌿 Southern Highlands</span>
      ${priceDisplay !== 'Contact us' ? `
      <div class="hero-price-pill">
        <span class="hp-from">From</span>
        <span class="hp-val">${esc(priceDisplay)}</span>
        <span class="hp-per">/ person</span>
      </div>` : ''}
    </div>`;

  // Build itinerary days from description if it contains day markers, else show as is
  const hasItinerary = t.itinerary && Array.isArray(t.itinerary) && t.itinerary.length > 0;

  // Highlights: if DB has highlights field use it, else generate defaults
  const highlights = t.highlights || [
    'Expert local guides included',
    'Park entry fees included',
    'Transport & transfers',
    'Meals as per itinerary',
  ];

  const highlightsHTML = highlights.map(h => `
    <div class="hl-card">
      <svg class="hl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      ${esc(h)}
    </div>`).join('');

  // Itinerary section
  const itineraryHTML = hasItinerary
    ? `<div class="section-label">Itinerary</div>
       <div class="itinerary">${t.itinerary.map((day, i) => `
         <div class="it-day">
           <div class="it-num">${i+1}</div>
           <div class="it-body">
             <h4>${esc(day.title || `Day ${i+1}`)}</h4>
             <p>${esc(day.description || '')}</p>
           </div>
         </div>`).join('')}
       </div>`
    : '';

  // Duration / group size / difficulty from DB or defaults
  const duration = t.duration || '3–5 Days';
  const groupSize = t.group_size || 'Up to 12';
  const difficulty = t.difficulty || 'Easy–Moderate';

  // Sidebar form booking card
  const sidebarHTML = `
    <div class="book-card">
      <div class="bc-header">
        <h3>Book This Tour</h3>
        <div class="bc-price-row">
          <span class="bc-from">From</span>
          <span class="bc-price">${esc(priceDisplay)}</span>
          <span class="bc-per">/ person</span>
        </div>
      </div>
      <div class="bc-body">
        <div class="ff">
          <label>Full Name</label>
          <input type="text" id="bc-name" placeholder="Your full name">
        </div>
        <div class="ff">
          <label>Email</label>
          <input type="email" id="bc-email" placeholder="your@email.com">
        </div>
        <div class="ff">
          <label>Phone</label>
          <input type="tel" id="bc-phone" placeholder="+255 …">
        </div>
        <div class="ff">
          <label>Date of Visit</label>
          <input type="date" id="bc-date">
        </div>
        <button class="btn-book" id="bc-submit">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Confirm Booking
        </button>
        <p class="bc-note">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          We'll confirm within 24 hours with payment details.
        </p>
      </div>
      <div class="bc-features">
        <div class="bc-feat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Southern Highlands, Tanzania
        </div>
        <div class="bc-feat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Duration: ${esc(duration)}
        </div>
        <div class="bc-feat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Group size: ${esc(groupSize)}
        </div>
        <div class="bc-feat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Difficulty: ${esc(difficulty)}
        </div>
      </div>
    </div>`;

  // Main content
  $('tour-layout-wrap').innerHTML = `
    <div class="tour-main">
      <div class="tour-eyebrow">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Ramika Safaris · Tanzania
      </div>
      <h1 class="tour-title">${esc(t.name)}</h1>
      <div class="tour-meta-row">
        <div class="meta-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${esc(duration)}
        </div>
        <div class="meta-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Max ${esc(groupSize)}
        </div>
        <div class="meta-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          ${esc(difficulty)}
        </div>
        <div class="meta-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          ${esc(priceDisplay)} per person
        </div>
      </div>

      <div class="section-label">About This Tour</div>
      <p class="tour-desc">${esc(t.description || 'Experience the breathtaking beauty of Tanzania\'s Southern Highlands with Ramika Safaris. Our expert local guides will take you through pristine landscapes, wildlife-rich ecosystems, and immersive cultural experiences.')}</p>

      <div class="section-label">What's Included</div>
      <div class="highlights-grid">${highlightsHTML}</div>

      ${itineraryHTML}
    </div>
    ${sidebarHTML}`;

  // Wire booking form
  const submitBtn = document.getElementById('bc-submit');
  const minDate = new Date(); minDate.setDate(minDate.getDate() + 1);
  const minStr = minDate.toISOString().split('T')[0];
  document.getElementById('bc-date').setAttribute('min', minStr);

  // Auto-fill from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('rs_ud') || 'null');
    if (saved) {
      if (saved.full_name) document.getElementById('bc-name').value = saved.full_name;
      if (saved.email)     document.getElementById('bc-email').value = saved.email;
      if (saved.phone)     document.getElementById('bc-phone').value = saved.phone;
    }
  } catch(e) {}

  submitBtn.addEventListener('click', () => bookTour(t));
}

async function bookTour(t) {
  const nameEl  = document.getElementById('bc-name');
  const emailEl = document.getElementById('bc-email');
  const phoneEl = document.getElementById('bc-phone');
  const dateEl  = document.getElementById('bc-date');
  const btn     = document.getElementById('bc-submit');

  const name  = nameEl.value.trim();
  const email = emailEl.value.trim();
  const phone = phoneEl.value.trim();
  const date  = dateEl.value;

  if (name.length < 2)  { toast('Please enter your full name', 'warning'); nameEl.focus(); return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Enter a valid email', 'warning'); emailEl.focus(); return; }
  if (!date)            { toast('Please select a date', 'warning'); dateEl.focus(); return; }

  const sel = new Date(date), today = new Date(); today.setHours(0,0,0,0);
  if (sel < today)      { toast('Choose a future date', 'warning'); dateEl.focus(); return; }

  btn.disabled = true;
  btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:6px"></span>Processing…';

  const rst = () => {
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>Confirm Booking';
  };

  try {
    // Duplicate check
    const { data: dup } = await supabase.from('bookings').select('id')
      .eq('email', email).eq('tour_name', t.name).eq('tour_date', date);
    if (dup?.length) { toast('You already booked this tour for this date.', 'warning'); rst(); return; }

    const { error } = await supabase.from('bookings').insert([{
      full_name: name, email, phone, tour_name: t.name, tour_date: date, notes: ''
    }]);
    if (error) { toast('Booking failed: ' + error.message, 'error'); rst(); return; }

    // Save to localStorage
    try { localStorage.setItem('rs_ud', JSON.stringify({ full_name: name, email, phone, ts: Date.now() })); } catch(e) {}

    toast(`Confirmed! We'll reach you at ${email} within 24h.`, 'success', 7000);
    showBookingModal({ name, email, phone, tour: t.name, date });
    rst();
  } catch(err) {
    toast('Something went wrong. Please try again.', 'error');
    rst();
  }
}

function showBookingModal({ name, email, phone, tour, date }) {
  document.getElementById('__modal')?.remove();
  const ref = '#RS' + Date.now().toString().slice(-6);
  const dateStr = new Date(date).toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const m = document.createElement('div');
  m.id = '__modal'; m.className = 'modal-wrap';
  m.innerHTML = `<div class="modal-box">
    <div class="modal-top">
      <div class="modal-check">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Booking Confirmed!</h2>
      <p class="modal-ref">${ref}</p>
    </div>
    <div class="modal-dets">
      <div class="md-row"><span>Tour</span><strong>${esc(tour)}</strong></div>
      <div class="md-row"><span>Date</span><strong>${esc(dateStr)}</strong></div>
      <div class="md-row"><span>Guest</span><strong>${esc(name)}</strong></div>
      <div class="md-row"><span>Email</span><strong>${esc(email)}</strong></div>
      ${phone ? `<div class="md-row"><span>Phone</span><strong>${esc(phone)}</strong></div>` : ''}
    </div>
    <p class="modal-note">We'll contact you within 24 hours with payment and tour details.</p>
    <button class="btn-submit" onclick="document.getElementById('__modal').remove()">Done</button>
  </div>`;
  document.body.appendChild(m);
  requestAnimationFrame(() => m.classList.add('open'));
  m.addEventListener('click', e => { if (e.target === m) m.remove(); });
}
</script>

<style>
@keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
</style>
</body>
